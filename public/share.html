<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Vessel Manual Portal</title>
  <link rel="stylesheet" href="/share.css">
</head>
<body>
  <div class="share-wrap">
    <header class="share-header">
      <div class="brand">
        <img src="/coral_logo_transparent.png" alt="Coral Marine" onerror="this.style.display='none'" style="width:80px;height:auto;object-fit:contain">
        <div>
          <div class="brand-main">Coral Marine Services</div>
          <div class="brand-sub">Client Vessel Manual Portal</div>
        </div>
      </div>
      <div class="readonly">Read only</div>
    </header>

    <main id="shareRoot">
      <div class="loading">Loading shared vessel...</div>
      <div class="note">This client link is read-only. Editing, uploads, and deletion are disabled.</div>
    </main>
  </div>

  <script src="/share.js"></script>
</body>
</html>
